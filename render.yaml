# Render Blueprint for the EduAI backend (Express + TypeScript).
# Deploy via Render dashboard → "New +" → "Blueprint" → pick this repo,
# or create a Web Service manually and mirror these settings.
services:
  - type: web
    name: eduai-backend
    runtime: node
    plan: free
    rootDir: backend
    # NODE_ENV=production makes `npm install` skip devDependencies (incl. the
    # TypeScript compiler), so force them in and then build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Puppeteer downloads Chromium during build. Keep it inside the project
      # dir so it survives into the runtime container (the default ~/.cache is
      # wiped between build and run on Render).
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/backend/.puppeteer-cache
      # Secrets — set these in the Render dashboard (sync:false = not in git).
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # URL of the Vercel frontend, e.g. https://eduai.vercel.app (for CORS).
      - key: FRONTEND_URL
        sync: false
      # Render auto-generates a strong secret on first deploy.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
